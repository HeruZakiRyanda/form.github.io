<!DOCTYPE html>
<html>

	<head>
		<title>Membuat Form</title>
	
	</head>
	
		<body>
			<h1 align="center">FORM PENDAFTARAN</h1>
			<form>
			<table>
				<tr>
				<td><label>Nama   </label></td>
				<td><input type="text" name="nama"></td>
				</tr>
				<tr>
				<td><label>NIM	 </label></td>
				<td><input type="number" name="nim"></td>
				</tr>
				<tr>
				<td><label>Email</label></td>
				<td> <input type="email" name="email" placeholder="Masukan Email"required></td>
				</tr>
				<tr>
				<td><label>Password</label></td>
				<td><input type="password" name="password"></td>
				</tr>
				<tr>
				<td><label>Tanggal Lahir</label></td>
				<td><input type="date" name="tgllahir"></td>
				</tr>
				<tr>
				<td>Alamat</td>
				<td><textarea rows="6" cols="40"></textarea></td>
				</tr>
				<tr>
				<td>Foto</td>
				<td><input type="file" name="foto"></td>
				<tr>
				<td><label>Jenis Kelamin</label></td>
				<td><input type="radio" name="gender" value="L">Laki-Laki
				<input type="radio" name="gender" value="P">Perempuan</td>
				</tr>
				<tr>
				<td><label>Hobi</label></td>
				<td>
				<input type="checkbox" name="hobi">Olahraga
				<input type="checkbox" name="hobi">Membaca
				<input type="checkbox" name="hobi">Menonton
				</tr>
				<tr>
				<td><label>Agama</label></td>
				<td><select>
						<option><option>
						<option value="islam"> Islam</option>
						<option> Kristen</option>
						<option> Budha</option>
						<option> Hindu</option>
						<option> Konghucu</option>
						<option> Jews</option>
				</select></td>
				<tr>
				<td></td>
				<td><input type="submit" value="submit">
				<input type="reset" value="reset"></td>
				</tr>
			</table>
			</form>
